id: https://example.org/schema-registry-utils/meta-model
name: schema_registry_meta_model
description: >-
  Meta-model for the schema registry: defines the registered object types
  (RegistryClass, RegistryProperty, and related support classes) used to
  describe classes and data elements that can be registered, versioned,
  related to each other, and compared for similarity.
  NOTE: `id` above is a placeholder namespace — replace before publishing.

prefixes:
  linkml: https://w3id.org/linkml/
  skos:   http://www.w3.org/2004/02/skos/core#
  prov:   http://www.w3.org/ns/prov#
  screg:  https://example.org/schema-registry-utils/

default_prefix: screg
default_range: string

imports:
  - linkml:types

# ---------------------------------------------------------------------------
# Classes
# ---------------------------------------------------------------------------
# RegistryClass and RegistryProperty are the core entities.
# ProvenanceEntry is a standalone node (one per source attestation) — an
# entity accumulates a ProvenanceEntry per source rather than being tied to
# a single source, which is how identity stays separate from provenance.
# Rule, Transform, and ValueSet are stubs: present so the model shape is
# visible, slots intentionally left minimal until that work is scoped.

classes:

  RegistryEntity:
    abstract: true
    description: >-
      Common base for content-addressed, provenance-tracked objects registered
      in the schema registry. Identity (hash_id) is derived from content, so
      there is no separate version slot: a change produces a new hash_id, with
      lineage tracked via derived_from on each ProvenanceEntry.
    slots:
      - hash_id
      - name
      - description
      - provenance
      - skos_mappings

  RegistryClass:
    is_a: RegistryEntity
    description: >-
      A registered class (object class) representing a concept or entity type
      in the registry, e.g. "Patient".
    slots:
      - properties
      - relations
      - is_a
      - mixins
      - class_uri
      - abstract
      - registry_version

  RegistryProperty:
    is_a: RegistryEntity
    description: >-
      A registered property (data element) representing a characteristic or
      attribute that can be attached to a RegistryClass, e.g. "age". Usage
      constraints (required, multivalued, min/max, pattern) are deliberately
      not here — they belong on Rule, since the same property can be required
      in one source's usage and optional in another's without being a
      different concept.
    slots:
      - range
      - units
      - slot_uri
      - registry_version

  ProvenanceEntry:
    description: >-
      One source's attestation of a registry entity — where it came from and
      how/when this record was generated (W3C PROV-O fields). An entity
      accumulates one ProvenanceEntry per source that attests to it; identity
      (hash_id) never depends on provenance, so the same entity can carry many.
      Stored as its own node, linked via HAS_PROVENANCE / HAS_PROVENANCE_P
      edges (multivalued — cannot be inlined into the parent's node table).
      Identified by uid, not hash_id — a ProvenanceEntry is a per-attestation
      record, not a deduplicated, content-addressed registry entity.
    slots:
      - uid
      - source
      - source_description
      - generated_at
      - attributed_to
      - activity
      - derived_from

  SkosMapping:
    description: >-
      A semantic mapping from a registry entity to an external vocabulary
      concept (SKOS mapping relation). Stored as its own node and linked via
      HAS_SKOS_MAPPING / HAS_SKOS_MAPPING_P edges.
    slots:
      - hash_id
      - mapping_type
      - target

  Relation:
    description: >-
      A directed relationship between two registry entities (classes or
      properties), with its own content-addressed identity and provenance.
    slots:
      - hash_id
      - subject
      - predicate
      - object
      - provenance

  Rule:
    description: >-
      STUB — a validation or business rule applicable to one or more registry
      entities (e.g. min/max value, pattern, required, multivalued constraints
      on a RegistryProperty). Slots intentionally minimal; scope TBD.
    slots:
      - hash_id
      - name
      - description

  Transform:
    description: >-
      STUB — a transformation between two RegistryClass definitions.
      Slots intentionally minimal; scope TBD.
    slots:
      - hash_id
      - name
      - description

  ValueSet:
    description: >-
      STUB — a controlled set of permissible values, usable as a
      RegistryProperty range. Slots intentionally minimal; scope TBD.
    slots:
      - hash_id
      - name
      - description

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  hash_id:
    identifier: true
    required: true
    range: uriorcurie
    description: >-
      Content-hash-derived identifier (format sha256:<hex>). A change in
      any identity-defining field produces a new hash_id; lineage is
      preserved via derived_from.

  name:
    range: string
    required: true
    description: Human-readable label for this entity.

  description:
    range: string
    required: true
    description: Human-readable description of this entity.

  provenance:
    range: ProvenanceEntry
    multivalued: true
    required: true
    description: >-
      One ProvenanceEntry per source attesting to this entity. Accumulates
      as more sources are ingested — never affects hash_id.

  skos_mappings:
    range: SkosMapping
    multivalued: true
    description: Semantic mappings to external vocabulary concepts.

  properties:
    range: RegistryProperty
    multivalued: true
    description: The set of properties that belong to this class.

  relations:
    range: Relation
    multivalued: true
    description: Directed relations from this class to other registry entities.

  is_a:
    range: RegistryClass
    description: The class this class inherits from (stored as hash_id FK).

  mixins:
    range: RegistryClass
    multivalued: true
    description: Additional classes mixed into this class.

  range:
    range: string
    required: true
    description: >-
      The data type or value range for this property (e.g. a primitive type
      name such as "string" or "integer", or the hash_id of a ValueSet for
      enumerated values).

  units:
    range: string
    description: Unit of measure for this property's values, if applicable.

  class_uri:
    range: uriorcurie
    description: >-
      Ontology IRI for this class, preserved from the source schema on
      ingestion. Not part of the content hash; used for alignment and
      cross-source lookup.

  slot_uri:
    range: uriorcurie
    description: >-
      Ontology IRI for this property, preserved from the source schema on
      ingestion. Not part of the content hash; used for alignment and
      cross-source lookup.

  abstract:
    range: boolean
    description: Whether this registered class is itself declared abstract.

  registry_version:
    range: string
    description: Registry snapshot version this entity belongs to.

  # --- ProvenanceEntry slots -------------------------------------------------

  uid:
    identifier: true
    required: true
    range: string
    description: >-
      Random unique identifier for this ProvenanceEntry record (not
      content-derived — a per-attestation record, not a deduplicated entity).

  source:
    range: string
    required: true
    description: Label of the source schema this attestation came from, e.g. "bids".

  source_description:
    range: string
    description: >-
      This source's own description text for the entity, if it differs
      from the entity's merged description.

  generated_at:
    range: datetime
    required: true
    slot_uri: prov:generatedAtTime
    description: ISO-8601 timestamp this ProvenanceEntry was generated.

  attributed_to:
    range: string
    required: true
    slot_uri: prov:wasAttributedTo
    description: Agent (user or system) that generated this ProvenanceEntry.

  activity:
    range: string
    slot_uri: prov:wasGeneratedBy
    description: >-
      The activity that produced this ProvenanceEntry, e.g. "ingestion",
      "manual", "alignment".

  derived_from:
    range: string
    multivalued: true
    slot_uri: prov:wasDerivedFrom
    annotations:
      db_json: true
    description: >-
      hash_ids of entities this entity was derived from, if any. Stored as
      a JSON-encoded string array in the graph database.

  # --- Relation slots ------------------------------------------------------

  subject:
    range: string
    required: true
    description: hash_id of the entity this relation points from.

  predicate:
    range: string
    required: true
    description: >-
      The type of relationship (e.g. isPartOf, isSimilarTo, isDerivedFrom).

  object:
    range: string
    required: true
    description: hash_id of the entity this relation points to.

  # --- SkosMapping slots ---------------------------------------------------

  mapping_type:
    range: SkosMappingTypeEnum
    description: The kind of SKOS mapping relation this represents.

  target:
    range: uriorcurie
    description: The external concept this mapping points to.

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enums:

  SkosMappingTypeEnum:
    description: The kind of SKOS mapping relation between a registry entity and an external concept.
    permissible_values:
      EXACT_MATCH:
        meaning: skos:exactMatch
        description: The registry entity is equivalent to the external concept.
      CLOSE_MATCH:
        meaning: skos:closeMatch
        description: The registry entity is sufficiently similar to the external concept.
      BROAD_MATCH:
        meaning: skos:broadMatch
        description: The external concept is broader than the registry entity.
      NARROW_MATCH:
        meaning: skos:narrowMatch
        description: The external concept is narrower than the registry entity.
      RELATED_MATCH:
        meaning: skos:relatedMatch
        description: The registry entity is related to the external concept.
