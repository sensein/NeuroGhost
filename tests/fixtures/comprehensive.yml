id: https://example.org/comprehensive
name: comprehensive
description: A schema exercising every element parse_linkml must extract.
prefixes:
  linkml: https://w3id.org/linkml/
  ex: https://example.org/schema#
default_prefix: ex
default_range: string
imports:
  - linkml:types

classes:
  Timestamped:
    mixin: true
    description: Mixin providing a creation timestamp.
    attributes:
      created_at:
        range: datetime

  Entity:
    abstract: true
    description: Abstract base for all registry entities.
    class_uri: ex:Entity
    slots:
      - name

  Person:
    is_a: Entity
    mixins:
      - Timestamped
    description: A research investigator.
    class_uri: schema:Person
    slots:
      - orcid
    attributes:
      role:
        description: "Role on the study (units: FTE)"
        range: string
        multivalued: true
        required: true
        pattern: "^[A-Za-z ]+$"

slots:
  name:
    description: Full name.
    range: string
    slot_uri: schema:name

  orcid:
    description: ORCID identifier.
    range: string
    slot_uri: ex:orcid
    pattern: "^\\d{4}-\\d{4}-\\d{4}-\\d{3}[0-9X]$"
